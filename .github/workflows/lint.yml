name: Lint

on:
  push:
    branches: [develop, master]
  pull_request:

jobs:
  format:
    name: dotnet format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Verify formatting
        run: dotnet format src/Castle.Sdk.sln --verify-no-changes
