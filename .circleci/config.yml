version: 2.1

jobs:
  build:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - run:
          name: Install SSH and Git
          command: apt-get update && apt-get install -y ssh git
      - checkout
      - run:
          name: Build
          command: cd src && dotnet build Castle.Sdk -c Release
      - run:
          name: Test
          command: cd src && dotnet test Tests

workflows:
  build-and-test:
    jobs:
      - build
